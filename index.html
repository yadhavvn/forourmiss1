<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You Miss</title>

<style>

body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ffecd2,#fcb69f);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  overflow:hidden;
}

/* Center container */
.container{
  width:90%;
  max-width:350px;
}

/* Title */
h1{
  color:#ff5722;
  font-size:28px;
  margin-bottom:20px;
}

/* Button */
button{
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:25px;
  background:#ff5722;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
}

/* Message box */
#message{
  margin-top:20px;
  background:white;
  padding:18px;
  border-radius:12px;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
  font-size:18px;
  display:none;
}

/* Hearts */
.heart{
  position:fixed;
  bottom:0;
  color:red;
  font-size:18px;
  animation: floatUp 4s linear forwards;
}

@keyframes floatUp{
  from{
    transform:translateY(0);
    opacity:1;
  }
  to{
    transform:translateY(-100vh);
    opacity:0;
  }
}

</style>
</head>

<body>

<div class="container">

<h1>🌸 Hi Heera Miss 🌸</h1>

<button onclick="startAnimation()">Click for Surprise 💖</button>

<div id="message">
Thank you Miss for your guidance, patience and inspiration.  
You make learning beautiful for all of us! 💐
</div>

</div>

<script>

function startAnimation(){

  document.getElementById("message").style.display="block";

  setInterval(function(){

    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤";
    heart.style.left=Math.random()*100+"vw";

    document.body.appendChild(heart);

    setTimeout(()=>{
      heart.remove();
    },4000);

  },300);
}

</script>

</body>
</html>
