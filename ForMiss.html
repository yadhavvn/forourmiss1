<!DOCTYPE html>
<html>
<head>
<title>Thank You Miss</title>

<style>

body{
  font-family: Arial, sans-serif;
  text-align:center;
  background: linear-gradient(135deg,#ffecd2,#fcb69f);
  padding-top:120px;
  overflow:hidden;
}

h1{
  color:#ff5722;
}

/* button */
button{
  padding:15px 30px;
  font-size:20px;
  border:none;
  border-radius:30px;
  background:#ff5722;
  color:white;
  cursor:pointer;
}

/* white message box */
#message{
  margin:30px auto;
  width:60%;
  background:white;
  padding:25px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
  font-size:22px;
  display:none;
}

/* hearts */
.heart{
  position:fixed;
  bottom:0;
  color:red;
  font-size:20px;
  animation: float 4s linear forwards;
}

@keyframes float{
  from{
    transform:translateY(0);
    opacity:1;
  }
  to{
    transform:translateY(-100vh);
    opacity:0;
  }
}

</style>
</head>

<body>

<h1>🌸 Hi Heera Miss 🌸</h1>

<button onclick="startAnimation()">Click Me 💖</button>

<div id="message">
Thank you Miss for your guidance, support and inspiration.  
You make learning enjoyable for all of us! 💐
</div>

<script>

function startAnimation(){

  document.getElementById("message").style.display="block";

  setInterval(function(){

    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="❤";
    heart.style.left=Math.random()*100+"vw";

    document.body.appendChild(heart);

    setTimeout(()=>{
      heart.remove();
    },4000);

  },300);
}

</script>

</body>
</html>
